dataset:
  batch_size: 32
model:
  activation: gelu
  d_ff: 256
  d_model: 128
  dropout: 0.2
  e_layers: 3
  enc_in: 20
  factor: 1
  label_len: 0
  n_heads: 8
  num_class: 2
  pred_len: 0
  seq_len: 200
  task_name: classification
train:
  device: cuda:0
  early_stop_min_delta: 0.005
  early_stop_patience: 15
  epochs: 100
  lr: 0.001
  weight_decay: 0.0001
