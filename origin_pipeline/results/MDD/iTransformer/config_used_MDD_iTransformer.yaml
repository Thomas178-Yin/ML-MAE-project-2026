dataset:
  batch_size: 32
model:
  activation: gelu
  d_ff: 128
  d_model: 64
  dropout: 0.1
  e_layers: 4
  embed: timeF
  enc_in: 20
  factor: 1
  freq: h
  label_len: 0
  n_heads: 8
  num_class: 2
  pred_len: 0
  seq_len: 200
  task_name: classification
train:
  device: cuda:0
  early_stop_min_delta: 1.0e-05
  early_stop_patience: 15
  epochs: 100
  lr: 0.001
  weight_decay: 0.0001
