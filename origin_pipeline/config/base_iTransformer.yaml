dataset:
  batch_size: 32

train:
  device: "cuda:0"
  lr: 0.001
  weight_decay: 0.0001
  epochs: 100
  early_stop_patience: 15
  early_stop_min_delta: 0.00001

model:
  # ==============================
  # 1. 任务与数据维度设置
  # ==============================
  task_name: 'classification'  # 当前任务类型：分类 (预测---long_term_forecast)
  seq_len: 200                 # T
  enc_in: 20                   # 通道数
  num_class: 2                 # 分类数 
  
  # if分类任务，填 0 即可
  label_len: 0
  pred_len: 0

  # ==============================
  # 2. iTransformer 超参数
  # ==============================
  d_model: 64                 # Transformer 模型隐藏层维度 
  n_heads: 8                   # 多头注意力机制的头数
  e_layers: 4                  # Encoder 叠加的层数
  d_ff: 128                    # 前馈神经网络(FFN)隐层维度
  dropout: 0.1                 # Dropout
  activation: 'gelu'           # 激活函数
  
  # ==============================
  # 3. Embedding  
  # ==============================
  embed: 'timeF'               # 时间特征编码方式 (timeF, fixed, learned)
  freq: 'h'                    # 频率标识
  factor: 1                    # SelfAttention 的稀疏因子 