dataset:
  batch_size: 32

model:
  chans: 20           # EEG 通道数
  time_point: 200     # 时间序列长度
  num_classes: 2      # 分类类别数（如抑郁症 MDD 是二分类）
  f1: 16
  d: 4
  pk1: 4
  pk2: 8
  dp: 0.5

train:
  device: "cuda:0"
  lr: 1.0e-4
  weight_decay: 5.0e-2
  epochs: 1000
  early_stop_patience: 30
  early_stop_min_delta: 0.00001