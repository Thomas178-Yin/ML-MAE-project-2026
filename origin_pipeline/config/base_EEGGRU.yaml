dataset:
  batch_size: 32

train:
  device: "cuda:0"
  lr: 0.001
  weight_decay: 0.0001
  epochs: 100
  early_stop_patience: 15
  early_stop_min_delta: 0.005

model:
  input_channels: 20    # N
  time_points: 200      # T
  num_classes: 2        # 分类类别数
  hidden_size: 64       # GRU 隐藏单元数
  num_layers: 2         # GRU 堆叠层数
  dropout: 0.3          # 随机失活概率