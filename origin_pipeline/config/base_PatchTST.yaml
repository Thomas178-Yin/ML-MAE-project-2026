dataset:
  batch_size: 32

train:
  device: "cuda:0"
  lr: 0.001
  weight_decay: 0.0001
  epochs: 100
  early_stop_patience: 15
  early_stop_min_delta: 0.00001

model:
  task_name: 'classification'
  seq_len: 200                 # T:
  enc_in: 20                   # N:
  num_class: 2                 # 类别数

  pred_len: 0                  # 分类任务占位
  label_len: 0                 # 分类任务占位
  
  # PatchTST 超参
  d_model: 128
  n_heads: 8
  e_layers: 3
  d_ff: 256
  dropout: 0.2
  activation: 'gelu'
  factor: 1                    # 注意力因子